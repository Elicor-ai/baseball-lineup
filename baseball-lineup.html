<style>
:root{--bg:#0f172a;--sur:#1e293b;--sur2:#334155;--txt:#f1f5f9;--mut:#94a3b8;--acc:#6366f1;--bor:#2d3f55;--grn:#22c55e;--ylw:#f59e0b;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{background:var(--sur);border-bottom:1px solid var(--bor);padding:8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;min-width:0;}
.topbar h1{font-size:.9rem;font-weight:700;flex-shrink:0;}
.topbar-mid{flex:1;min-width:0;display:flex;justify-content:center;}
.game-sel{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:5px 6px;color:var(--txt);font-size:.7rem;font-weight:600;cursor:pointer;max-width:130px;width:100%;min-width:0;}
.btn-ng{background:var(--acc);color:white;border:none;border-radius:8px;padding:7px 10px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0;}
.btn-od{background:none;border:1px solid var(--bor);border-radius:8px;padding:6px 8px;color:var(--mut);font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0;transition:border-color .2s,color .2s;}
.btn-od.connected{color:#22c55e;border-color:#22c55e44;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:12px;padding-bottom:82px;}
.screen.active{display:block;}
.nav{height:62px;background:var(--sur);border-top:1px solid var(--bor);display:flex;flex-shrink:0;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:none;border:none;color:var(--mut);cursor:pointer;font-size:.5rem;font-weight:600;transition:color .15s;touch-action:manipulation;}
.nb .ic{font-size:1.1rem;}
/* ── RÉSUMÉ TABLE ── */
.sum-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sum-table{width:100%;border-collapse:collapse;font-size:.72rem;}
.sum-table th{background:var(--sur2);font-weight:700;font-size:.68rem;padding:5px 3px;text-align:center;border:1px solid var(--bor);white-space:nowrap;}
.sum-table th.th-name{text-align:left;padding-left:8px;}
.sum-table td{padding:3px 2px;text-align:center;border:1px solid var(--bor);}
.sum-table tr:nth-child(even) td{background:#ffffff08;}
.pos-inp{width:32px;height:30px;background:var(--sur2);border:1px solid var(--bor);border-radius:5px;color:var(--txt);text-align:center;font-size:.8rem;font-weight:700;padding:0;cursor:pointer;touch-action:manipulation;}
.pos-inp.filled{background:#6366f122;border-color:#6366f155;color:#a5b4fc;}
.pos-inp.bench{background:#94a3b811;color:var(--mut);}
.ord-inp{width:28px;height:30px;background:var(--sur2);border:1px solid var(--bor);border-radius:5px;color:var(--acc);text-align:center;font-size:.8rem;font-weight:700;padding:0;}
.sum-name{text-align:left;padding-left:6px;font-size:.72rem;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.sum-absent{opacity:.4;}
.tpl-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.pos-legend{font-size:.65rem;color:var(--mut);line-height:1.7;margin-top:8px;padding:8px;background:var(--sur);border-radius:8px;}
.pb-btn{width:100%;padding:15px;font-size:1.1rem;font-weight:800;letter-spacing:.05em;border-radius:12px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;cursor:pointer;touch-action:manipulation;}
/* Scoreboard */
.sc-tbl{width:100%;border-collapse:collapse;font-size:.75rem;}
.sc-tbl th{background:var(--sur2);text-align:center;padding:4px 2px;border:1px solid var(--bor);font-size:.6rem;font-weight:700;}
.sc-team{font-weight:700;padding:4px 6px;border:1px solid var(--bor);font-size:.7rem;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-cell{border:1px solid var(--bor);text-align:center;padding:2px 1px;vertical-align:middle;}
.sc-runs{font-size:.95rem;font-weight:800;line-height:1.2;}
.sc-adj{display:flex;gap:2px;justify-content:center;margin-top:2px;}
.sc-adj button{background:var(--sur2);border:1px solid var(--bor);border-radius:4px;width:22px;height:18px;color:var(--txt);font-size:.8rem;cursor:pointer;line-height:1;touch-action:manipulation;}
.sc-total{font-size:1.1rem;font-weight:800;text-align:center;border:1px solid var(--bor);padding:4px 6px;}
.sc-win{color:#4ade80;}
/* At-bat counter */
.ab-wrap{padding:10px 0 4px;border-top:1px solid var(--bor);margin-top:10px;}
.ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px;}
.ab-label{font-size:.6rem;font-weight:800;letter-spacing:.1em;color:var(--mut);}
.ab-batter{font-size:.72rem;font-weight:700;color:var(--acc);flex:1;text-align:center;}
.ab-dots{display:flex;gap:16px;justify-content:center;}
.ab-group{text-align:center;}
.ab-gtitle{font-size:.5rem;letter-spacing:.12em;color:var(--mut);margin-bottom:4px;text-transform:uppercase;}
.ab-row{display:flex;gap:5px;justify-content:center;}
.ab-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bor);display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .2s;}
.ab-dot.ball{background:#fbbf24;border-color:#f59e0b;color:#000;}
.ab-dot.strike{background:#ef4444;border-color:#dc2626;color:#fff;border-radius:3px;}
.ab-dot.out{background:#f97316;border-color:#ea580c;color:#fff;border-radius:3px;}
.pb-timer{font-size:2.8rem;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;line-height:1;padding:8px 0 4px;color:var(--acc);transition:color .5s;}
.pb-timer.warn{color:#fbbf24;}
.pb-timer.danger{color:#ef4444;animation:pulse 1s infinite;}
.pb-status{font-size:.78rem;text-align:center;padding:4px 0 2px;min-height:1.5em;}
.pb-rule{font-size:.72rem;background:var(--sur2);border-radius:6px;padding:6px 10px;text-align:center;margin-top:4px;border:1px solid var(--bor);}
.pit-week-bar{font-size:.7rem;margin-top:8px;padding:8px 10px;background:var(--sur2);border-radius:8px;border:1px solid var(--bor);}
.pwb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pwb-label{color:var(--mut);}
.pwb-count{font-weight:700;}
.pwb-count.ok{color:#4ade80;}.pwb-count.warn{color:#fbbf24;}.pwb-count.danger{color:#ef4444;}
.pwb-track{height:7px;background:var(--bor);border-radius:4px;overflow:hidden;}
.pwb-fill{height:7px;border-radius:4px;background:var(--acc);transition:width .4s;}
.pwb-fill.warn{background:#fbbf24;}.pwb-fill.danger{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pstats{font-size:.63rem;color:var(--mut);margin-top:3px;line-height:1.6;}
.pstats-pres{color:var(--acc);font-weight:700;margin-right:6px;}
.pstats-pres.low{color:#f87171;}
.pstats-pres.mid{color:#fbbf24;}
.pstats-pres.hi{color:#4ade80;}
.ppos-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.ppos-chip{background:var(--sur2);border:1px solid var(--bor);border-radius:4px;padding:1px 5px;font-size:.6rem;font-weight:700;white-space:nowrap;}
.ppos-chip.pos-P{border-color:#f472b655;color:#f472b6;}
.ppos-chip.pos-C{border-color:#fb923c55;color:#fb923c;}
.ppos-chip.pos-X{border-color:#64748b55;color:#94a3b8;}
.ppos-chip.pos-field{border-color:#6366f155;color:#a5b4fc;}
.nb.active{color:var(--acc);}
.card{background:var(--sur);border-radius:14px;padding:13px;margin-bottom:10px;}
.ct{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:10px;}
.form-row{margin-bottom:8px;}
.form-row label{display:block;font-size:.73rem;color:var(--mut);margin-bottom:4px;}
input[type=text],input[type=number],input[type=date],select{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:.88rem;}
input:focus,select:focus{outline:none;border-color:var(--acc);}
input::placeholder{color:var(--mut);}
select option{background:#1e293b;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.btn{display:block;width:100%;padding:11px;border-radius:10px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;touch-action:manipulation;}
.btn:active{transform:scale(.97);opacity:.8;}
.bpri{background:var(--acc);color:white;}
.bsec{background:var(--sur2);color:var(--txt);}
.bdng{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.bsuc{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.bsm{padding:6px 10px;font-size:.73rem;border-radius:7px;width:auto;display:inline-block;}
.player-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bor);}
.player-row:last-child{border-bottom:none;}
.nbadge{min-width:32px;height:32px;border-radius:8px;background:var(--acc);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;flex-shrink:0;}
.nbadge.sub{background:var(--sur2);color:var(--mut);}
.pinfo{flex:1;min-width:0;}
.pname{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ppos{font-size:.7rem;color:var(--mut);}
.ract{display:flex;gap:4px;flex-shrink:0;}
.ibtn{width:36px;height:36px;border-radius:8px;border:none;background:var(--sur2);color:var(--mut);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;touch-action:manipulation;flex-shrink:0;}
.ibtn.dng{color:#ef4444;background:#ef444415;}
.ibtn:active{background:var(--acc);color:white;}
.ibtn:disabled{opacity:.3;pointer-events:none;}
.empty{text-align:center;padding:28px 16px;color:var(--mut);}
.empty .ei{font-size:2.3rem;margin-bottom:8px;}
.onum{width:22px;font-weight:800;font-size:.88rem;color:var(--mut);flex-shrink:0;text-align:center;}
.pas{display:flex;gap:3px;flex-wrap:wrap;align-items:center;}
.pac{border-radius:5px;padding:2px 5px;font-size:.62rem;font-weight:800;cursor:pointer;}
.pac.c1B{background:#22c55e33;color:#22c55e;}
.pac.c2B{background:#3b82f633;color:#60a5fa;}
.pac.c3B{background:#8b5cf633;color:#a78bfa;}
.pac.cHR{background:#f59e0b33;color:#fbbf24;}
.pac.cBB{background:#14b8a633;color:#2dd4bf;}
.pac.cOUT{background:#ef444433;color:#f87171;}
.pac.cK{background:#ef444455;color:#fca5a5;}
.apab{width:28px;height:28px;border-radius:50%;background:var(--sur2);border:none;color:var(--mut);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.apab:active{background:var(--acc);color:white;}
.itabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:10px;}
.itabs::-webkit-scrollbar{display:none;}
.itab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:none;background:var(--sur2);color:var(--mut);cursor:pointer;font-size:.75rem;font-weight:700;transition:background .15s,color .15s;touch-action:manipulation;}
.itab.active{background:var(--acc);color:white;}
.field-wrap{border-radius:12px;overflow:hidden;margin-bottom:10px;}
.pb{border:none;border-radius:13px;padding:18px 6px 13px;font-size:.83rem;font-weight:800;cursor:pointer;text-align:center;box-shadow:0 4px 12px #0005;transition:transform .1s,opacity .15s;touch-action:manipulation;}
.pb:active{transform:scale(.92);opacity:.8;}
.pb .bi{font-size:1.65rem;display:block;margin-bottom:4px;}
.pb-b{background:#f59e0b;color:#0f172a;}
.pb-s{background:#22c55e;color:#0f172a;}
.pb-h{background:#ef4444;color:white;}
.pb-hbp{background:linear-gradient(135deg,#a855f7,#7c3aed);color:white;}
.pb-ret{background:linear-gradient(135deg,#f97316,#c2410c);color:white;}
.g2sm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pb-sm{border:none;border-radius:11px;padding:12px 6px 9px;font-size:.72rem;font-weight:800;cursor:pointer;text-align:center;box-shadow:0 3px 8px #0004;transition:transform .1s,opacity .15s;touch-action:manipulation;}
.pb-sm:active{transform:scale(.92);opacity:.8;}
.pb-sm .bi{font-size:1.3rem;display:block;margin-bottom:3px;}
.cboxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;}
.cb{border-radius:10px;padding:10px 4px 8px;text-align:center;}
.cb.bl{background:#f59e0b18;border:2px solid #f59e0b;}
.cb.st{background:#22c55e18;border:2px solid #22c55e;}
.cb.hi{background:#ef444418;border:2px solid #ef4444;}
.cbn{font-size:2rem;font-weight:800;line-height:1;}
.cb.bl .cbn{color:#f59e0b;}
.cb.st .cbn{color:#22c55e;}
.cb.hi .cbn{color:#ef4444;}
.cbl{font-size:.62rem;color:var(--mut);margin-top:3px;font-weight:700;text-transform:uppercase;}
.ubtn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:9px;background:none;border:1px solid var(--bor);border-radius:9px;color:var(--mut);cursor:pointer;font-size:.8rem;touch-action:manipulation;}
.stabs{display:flex;gap:4px;margin-bottom:12px;}
.stab{flex:1;padding:8px;border-radius:9px;border:none;background:var(--sur2);color:var(--mut);cursor:pointer;font-size:.75rem;font-weight:700;touch-action:manipulation;}
.stab.active{background:var(--acc);color:white;}
.stbl{width:100%;border-collapse:collapse;font-size:.75rem;}
.stbl th,.stbl td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--bor);}
.stbl th{color:var(--mut);font-weight:700;font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;}
.stbl td:first-child{text-align:left;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hl{color:#fbbf24;font-weight:700;}
.modal-bg{display:none;position:fixed;inset:0;background:#000a;z-index:500;align-items:flex-end;}
.modal-bg.show{display:flex;}
.modal-box{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:80vh;display:flex;flex-direction:column;animation:up .22s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:32px;height:4px;background:var(--bor);border-radius:2px;margin:10px auto 0;}
.mhead{padding:12px 16px 10px;border-bottom:1px solid var(--bor);}
.mtitle{font-size:.95rem;font-weight:700;}
.msub{font-size:.73rem;color:var(--mut);margin-top:2px;}
.mbody{overflow-y:auto;padding:6px 0;}
.mrow{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .12s;}
.mrow:active{background:var(--sur2);}
.mpad{padding:13px 16px;}
.mcheck{margin-left:auto;color:var(--acc);}
.abadge{margin-left:auto;font-size:.62rem;font-weight:700;background:#f59e0b22;color:#f59e0b;border-radius:999px;padding:2px 7px;}
.arow{display:flex;gap:6px;margin-bottom:10px;}
.abtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;background:var(--sur2);border:none;border-radius:10px;color:var(--txt);cursor:pointer;font-size:.62rem;font-weight:600;touch-action:manipulation;}
.abtn .ai{font-size:1.25rem;}
.abtn:active{background:var(--acc);color:white;}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#334155ee;backdrop-filter:blur(6px);color:white;padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:600;z-index:600;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.sep{margin:12px 0 8px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);display:flex;align-items:center;gap:8px;}
.sep::after{content:'';flex:1;height:1px;background:var(--bor);}
.divl{height:1px;background:var(--bor);margin:10px 0;}
.badge{display:inline-block;border-radius:999px;padding:2px 6px;font-size:.62rem;font-weight:700;}
.bp{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>⚾</h1>
  <div class="topbar-mid">
    <select class="game-sel" id="gsel" onchange="selectGame(this.value)" style="display:none"></select>
  </div>
  <span id="save-dot" style="font-size:.58rem;color:var(--mut);white-space:nowrap;transition:color .3s;flex-shrink:0">💾</span>
  <span id="sync-dot" onclick="doSyncModal()" title="Sync temps réel" style="font-size:.6rem;color:var(--mut);white-space:nowrap;cursor:pointer;flex-shrink:0;display:none;padding:3px 6px;border-radius:6px;border:1px solid var(--bor)">🔄</span>
  <button class="btn-od" id="od-btn" onclick="odAction()" title="Synchronisation OneDrive">☁️</button>
  <button class="btn-ng" onclick="newGameModal()">+ Match</button>
</div>
<div class="content">

<!-- P1: ÉQUIPE -->
<div class="screen active" id="screen-equipe">
  <div class="card">
    <div class="ct">Ajouter une joueuse</div>
    <div class="g2">
      <div class="form-row" style="margin-bottom:0"><label>Nom</label><input id="pn" type="text" placeholder="Marie Tremblay"></div>
      <div class="form-row" style="margin-bottom:0"><label>Numéro</label><input id="pno" type="number" placeholder="12" min="0" max="99"></div>
    </div>
    <button class="btn bpri" style="margin-top:10px" onclick="addPlayer()">+ Ajouter</button>
  </div>
  <div class="card"><div id="roster"></div></div>
</div>

<!-- P2: FRAPPE -->
<div class="screen" id="screen-frappe">
  <div id="frappe-c"></div>
</div>

<!-- P3: DÉFENSE -->
<div class="screen" id="screen-defense">
  <div id="def-c"></div>
</div>

<!-- P4: PARTIE -->
<div class="screen" id="screen-partie">
  <div id="pb-area"></div>
  <div id="score-area"></div>
  <div class="card">
    <div class="ct">Manche</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;padding:4px 0">
      <button class="ibtn" style="width:44px;height:44px;font-size:1.3rem" onclick="chgIng(-1)">−</button>
      <div style="text-align:center">
        <div style="font-size:2.6rem;font-weight:800;line-height:1" id="ing-disp">1</div>
        <div style="font-size:.62rem;color:var(--mut);text-transform:uppercase;letter-spacing:.1em">Manche</div>
      </div>
      <button class="ibtn" style="width:44px;height:44px;font-size:1.3rem" onclick="chgIng(1)">+</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Lanceuse</div>
    <select id="pit-sel" onchange="setPitcher(this.value)" style="width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:10px;color:var(--txt);font-size:.88rem;font-weight:600"></select>
    <div id="pit-week"></div>
  </div>
  <div class="card">
    <div class="ct">Lancers — Manche <span id="ing-lbl">1</span></div>
    <div class="cboxes">
      <div class="cb bl"><div class="cbn" id="cb-b">0</div><div class="cbl">Balles</div></div>
      <div class="cb st"><div class="cbn" id="cb-s">0</div><div class="cbl">Prises</div></div>
      <div class="cb hi"><div class="cbn" id="cb-h">0</div><div class="cbl">Frappées</div></div>
    </div>
    <div class="g3" style="margin-bottom:8px">
      <button class="pb pb-b" onclick="doPitch('ball')"><span class="bi">⚪</span>BALL</button>
      <button class="pb pb-s" onclick="doPitch('strike')"><span class="bi">✅</span>PRISE</button>
      <button class="pb pb-h" onclick="doPitch('hit')"><span class="bi">💥</span>FRAPPÉE</button>
    </div>
    <div class="g2sm">
      <button class="pb-sm pb-hbp" onclick="doHBP()"><span class="bi">🤕</span>ATTEINTE (HBP)</button>
      <button class="pb-sm pb-ret" onclick="doRetrait()"><span class="bi">❌</span>RETRAIT</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <button class="ubtn" onclick="undoPitch()" style="flex:1">↩ Annuler</button>
      <span style="font-size:.75rem;color:var(--mut)">Total: <strong id="tot-p">0</strong></span>
    </div>
    <div id="pdots" style="display:flex;flex-wrap:wrap;gap:3px"></div>
    <div id="ab-count"></div>

<script>
// ── ONEDRIVE SYNC ──
const OD_SCOPE=['Files.ReadWrite'];
// Fichier dans un dossier normal (partageable) au lieu de approot
const OD_FILE_OWN='https://graph.microsoft.com/v1.0/me/drive/root:/Baseball Coach/baseball-data.json:/content';
let _msalApp=null,_odToken=null,_odSaveTimer=null,_odReady=false;

function odClientId(){return localStorage.getItem('bbc-od-clientid')||'e31eae33-3840-478d-ac50-63195a63bf58';}

// Retourne l'URL du fichier : shared si code équipe entré, sinon personnel
function odFileUrl(){
  const code=localStorage.getItem('bbc-od-teamcode');
  if(code){
    try{
      const dec=atob(code);
      const sep=dec.indexOf(':');
      const driveId=dec.substring(0,sep);
      const itemId=dec.substring(sep+1);
      return`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/content`;
    }catch(e){}
  }
  return OD_FILE_OWN;
}

// Récupère l'ID du fichier pour générer le code équipe
async function fetchTeamCode(){
  if(!_odToken)return null;
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/Baseball Coach/baseball-data.json',{
      headers:{Authorization:'Bearer '+_odToken}
    });
    if(!r.ok)return null;
    const meta=await r.json();
    const driveId=meta.parentReference?.driveId;
    const itemId=meta.id;
    if(driveId&&itemId)return btoa(driveId+':'+itemId);
  }catch(e){}
  return null;
}

async function initMSAL(){
  const cid=odClientId();
  if(!cid||!window.msal){updateODBtn();return;}
  try{
    _msalApp=new msal.PublicClientApplication({
      auth:{clientId:cid,authority:'https://login.microsoftonline.com/common',
        redirectUri:window.location.href.split('#')[0]},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
    });
    await _msalApp.initialize();
    try{
      const resp=await _msalApp.handleRedirectPromise();
      if(resp&&resp.accessToken){
        _odToken=resp.accessToken;_odReady=true;
        updateODBtn();showToast('✅ OneDrive connecté!');
        await syncFromOD();return;
      }
    }catch(e){console.warn('redirect handle error',e);}
    const accounts=_msalApp.getAllAccounts();
    if(accounts.length>0){
      try{
        const r=await _msalApp.acquireTokenSilent({scopes:OD_SCOPE,account:accounts[0]});
        _odToken=r.accessToken;_odReady=true;
        updateODBtn();
        await syncFromOD();
      }catch(e){_odToken=null;_odReady=false;updateODBtn();}
    }else{updateODBtn();}
  }catch(e){console.warn('MSAL init error',e);updateODBtn();}
}

async function odAction(){
  if(!_msalApp){showToast('⚠️ MSAL non chargé');return;}
  if(_odReady){

    openM('☁️ OneDrive','',`
      <div class="mrow" onclick="odShowTeamCode();closeM()">

        <div class="pinfo"><div class="pname">Code équipe</div><div class="ppos">Partager avec un autre coach</div></div>
      </div>

      </div>
      <div class="mrow" onclick="odDisconnect();closeM()">
        <div class="nbadge sub" style="font-size:1.1rem">✕</div>
        <div class="pinfo"><div class="pname">Déconnecter</div><div class="ppos">Quitter OneDrive</div></div>
      </div>`);
    return;

  try{
    await _msalApp.loginRedirect({scopes:OD_SCOPE});
  }catch(e){showToast('⚠️ Connexion échouée: '+e.message);}
}

async function odShowTeamCode(){
  showToast('⏳ Génération du code...');

    <div style="font-size:.75rem;color:var(--mut);margin-top:12px;line-height:1.5">
      ⚠️ Dans OneDrive, partage aussi le dossier <b>"Baseball Coach"</b> avec l'email de l'autre coach (accès modification).
    </div>`);
}

function odEnterTeamCode(){
  const cur=localStorage.getItem('bbc-od-teamcode')||'';
  const code=prompt(`🔑 Code équipe\n\nEntre le code reçu du coach principal :\n(Laisse vide pour utiliser ton propre OneDrive)`,cur);
  if(code===null)return;
  if(code.trim()){
    localStorage.setItem('bbc-od-teamcode',code.trim());
    showToast('✅ Code équipe enregistré');
    syncFromOD();
  }else{
    localStorage.removeItem('bbc-od-teamcode');
    showToast('☁️ Revenu à ton OneDrive personnel');
    syncFromOD();
  }
}

function odDisconnect(){
  try{_msalApp.logoutRedirect();}catch(e){}
  _odToken=null;_odReady=false;updateODBtn();
  showToast('☁️ OneDrive déconnecté');
}

function updateODBtn(){
  const btn=document.getElementById('od-btn');if(!btn)return;
  const shared=!!localStorage.getItem('bbc-od-teamcode');
  if(_odReady){
    btn.textContent=shared?'🔗✓':'☁️✓';
    btn.title=shared?'OneDrive partagé connecté':'OneDrive connecté';
    btn.classList.add('connected');
  }else{
    btn.textContent='☁️';
    btn.title='Connecter OneDrive';
    btn.classList.remove('connected');
  }
}

async function syncFromOD(){
  if(!_odToken||!_odReady)return;
  try{
    const url=odFileUrl();
    const r=await fetch(url,{headers:{Authorization:'Bearer '+_odToken}});
    if(r.status===404){await saveToOD();return;}
    if(!r.ok)return;
    const d=await r.json();
    if(d&&d.team&&d.games&&d.games.length>=S.games.length){
      S=d;
      const j=JSON.stringify(S);
      try{localStorage.setItem('bbc-v5',j);}catch(e){}
      rRoster();rtopbar();
      const a=document.querySelector('.screen.active');
      if(a)go(a.id.replace('screen-',''));
      showToast('☁️ Données chargées depuis OneDrive');
    }
  }catch(e){console.warn('OD sync error',e);}
}

async function saveToOD(){
  if(!_odToken||!_odReady)return;
  try{
    await fetch(odFileUrl(),{
      method:'PUT',
      headers:{Authorization:'Bearer '+_odToken,'Content-Type':'application/json'},
      body:JSON.stringify(S)
    });
  }catch(e){console.warn('OD save error',e);}
}

function scheduleODSave(){
  if(!_odReady)return;
  clearTimeout(_odSaveTimer);
  _odSaveTimer=setTimeout(saveToOD,4000);
}

function doSyncModal(){
  if(!_fbInit())return;
  const active=!!_syncCode;
  openM('🔄 Sync temps réel','',`<div class="mpad">
    ${active
      ?`<div style="background:#14532d;border:1px solid #22c55e;color:#bbf7d0;padding:14px;border-radius:10px;text-align:center;margin-bottom:16px">
          <div style="font-size:.7rem;letter-spacing:1px;margin-bottom:4px">SYNC ACTIVE</div>

      :`<div style="font-size:.82rem;color:var(--mut);margin-bottom:16px">Créez une salle et partagez le code — toutes les modifications se synchronisent automatiquement en temps réel.</div>`
    }
    <button class="btn bacc" style="width:100%;margin-bottom:10px" onclick="closeM();_syncCreate()">🆕 Créer une salle</button>

        oninput="this.value=this.value.toUpperCase()">
      <button class="btn bsec" onclick="const c=document.getElementById('sync-in')?.value;closeM();_syncJoin(c)">Rejoindre</button>
    </div>
    ${active?`<button class="btn bdng" style="width:100%;margin-top:10px" onclick="closeM();_syncStop()">⏹ Arrêter la sync</button>`:''}
  </div>`);
}

function _syncCreate(){
  if(_syncRef)_syncRef.off('value',_onSyncData);
  _syncCode=Math.random().toString(36).slice(2,8).toUpperCase();
  _syncRef=_fbDb.ref('salles/'+_syncCode+'/data');
  _syncPush();
  _syncRef.on('value',_onSyncData);
  _rSyncDot();
  setTimeout(()=>{
    openM('✅ Salle créée!','',`<div class="mpad" style="text-align:center">
      <div style="font-size:.75rem;color:var(--mut);margin-bottom:8px">CODE DE SYNCHRONISATION</div>
      <div style="font-size:2.5rem;font-weight:900;letter-spacing:8px;color:#22c55e;margin:12px 0">${_syncCode}</div>
      <div style="font-size:.82rem;color:var(--mut);margin-bottom:16px">Partagez ce code à votre co-entraîneur.<br>Il entre ce code dans Sync Live → Rejoindre.</div>
      <button class="btn bacc" style="width:100%;margin-bottom:8px" onclick="navigator.clipboard.writeText('${_syncCode}').then(()=>showToast('📋 Code copié!'))">📋 Copier le code</button>
      <button class="btn bsec" style="width:100%" onclick="closeM()">OK</button>
    </div>`);
  },150);
}

function _syncJoin(code){
  if(!code||code.length<4){showToast('⚠️ Code invalide');return;}
  if(_syncRef)_syncRef.off('value',_onSyncData);
  _syncCode=code.trim().toUpperCase();
  _syncRef=_fbDb.ref('salles/'+_syncCode+'/data');
  _syncRef.on('value',_onSyncData);
  _rSyncDot();
  showToast('🔄 Connexion à la salle '+_syncCode+'…');
}

function _onSyncData(snap){
  const remote=snap.val();
  if(!remote){_syncPush();return;}
  const rts=remote._ts||0;
  if(rts>_lastMyTs&&rts>(S._ts||0)){
    const ts=rts;
    delete remote._ts;
    S=remote;S._ts=ts;
    const json=JSON.stringify(S);
    try{localStorage.setItem('bbc-v5',json);}catch(e){}
    rRoster();rtopbar();
    const act=document.querySelector('.screen.active');
    if(act){const p=act.id.replace('screen-','');if(p!=='stats')go(p);}
    showToast('🔄 Synchronisé!');
  }
}

function _syncPush(){
  if(!_fbDb||!_syncCode||!_syncRef)return;
  clearTimeout(_syncPushT);
  _syncPushT=setTimeout(()=>{
    _lastMyTs=Date.now();
    const data=JSON.parse(JSON.stringify(S));
    data._ts=_lastMyTs;
    _syncRef.set(data).catch(e=>showToast('⚠️ Erreur sync: '+e.message));
  },600);
}

function _syncStop(){
  if(_syncRef){_syncRef.off('value',_onSyncData);_syncRef=null;}
  _syncCode=null;delete S._ts;_lastMyTs=0;
  _rSyncDot();showToast('⏹ Sync arrêtée');
}

function _rSyncDot(){
  const el=document.getElementById('sync-dot');if(!el)return;
  if(_syncCode){
    el.innerHTML='🔄 '+_syncCode;
    el.style.color='#22c55e';
    el.style.borderColor='#22c55e';
    el.style.display='inline';
  }else if(_fbConfigured()){
    el.innerHTML='🔄';
    el.style.color='var(--mut)';
    el.style.borderColor='var(--bor)';
    el.style.display='inline';
  }else{
    el.style.display='none';
  }
}

  const last=S.games[S.games.length-1];
  openM('Nouveau match','',`<div class="mpad">

    <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;padding:4px 0;cursor:pointer"><input type="checkbox" id="nd2" style="width:auto"> Copier la défense (6 manches)</label>`:''}
    <button class="btn bpri" style="margin-top:12px" onclick="createGame()">Créer le match</button>
  </div>`);

function createGame(){
  const dt=document.getElementById('nd').value||new Date().toISOString().split('T')[0];
  const op=document.getElementById('no')?.value.trim()||'';
  const cb=document.getElementById('nb')?.checked;
  const cd=document.getElementById('nd2')?.checked;
  const last=S.games[S.games.length-1];
  const tpl=S.team.template;
  const g={id:uid(),date:dt,opponent:op,batting:[],defense:{1:{},2:{},3:{},4:{},5:{},6:{}},pitches:{},score:{home:[0,0,0,0,0,0],visit:[0,0,0,0,0,0]}};
  if(cb&&last){g.batting=last.batting.map(b=>({playerId:b.playerId,order:b.order,pas:[]}));}
  else if(tpl&&tpl.lineup&&tpl.lineup.length){
    g.batting=tpl.lineup.filter(l=>PB(l.playerId)).map(l=>({playerId:l.playerId,order:l.order,pas:[]}));
  }
  if(cd&&last){g.defense=JSON.parse(JSON.stringify(last.defense));}
  else if(!cb&&tpl&&tpl.lineup&&tpl.lineup.length){
    for(let ing=1;ing<=6;ing++){
      g.defense[ing]={};
      tpl.lineup.forEach(l=>{
        const pos=l.positions?l.positions[ing]:null;
        if(pos&&pos!=='X'){const posId=_p2i[parseInt(pos)];if(posId)g.defense[ing][posId]=l.playerId;}
      });
    }
  }
  S.games.push(g);S.curGameId=g.id;save();closeM();rtopbar();
  showToast('✅ Match créé — '+dt+(tpl&&tpl.lineup&&tpl.lineup.length?' (modèle appliqué)':''));
}

// ── PAGE 6: RÉSUMÉ ──
const _p2i={1:'P',2:'C',3:'1B',4:'2B',5:'3B',6:'SS',7:'LF',8:'CF',9:'RF'};
const _i2p={'P':1,'C':2,'1B':3,'2B':4,'3B':5,'SS':6,'LF':7,'CF':8,'RF':9};

function rResume(){
  const el=document.getElementById('resume-c');if(!el)return;
  const g=CG();
  // Construire ligne par ligne : joueurs dans le batting order + non assignés
  const inBatting=g?g.batting.slice().sort((a,b)=>a.order-b.order):[];
  const assignedIds=new Set(inBatting.map(b=>b.playerId));
  const unassigned=S.team.players.filter(p=>!assignedIds.has(p.id));
  const allRows=[...inBatting.map(b=>({playerId:b.playerId,order:b.order,player:PB(b.playerId),present:true})),
                 ...unassigned.map(p=>({playerId:p.id,order:null,player:p,present:false}))];

  const hasTpl=!!(S.team.template&&S.team.template.lineup&&S.team.template.lineup.length);

  let h=`<div class="tpl-bar">
    <div style="font-weight:700;font-size:.85rem;flex:1">📋 Tableau résumé${g?' — '+(g.date||'')+(g.opponent?' vs '+g.opponent:''):' — Modèle saison'}</div>
    ${g?`<button class="btn bacc bsm" onclick="saveAsTemplate()" title="Sauvegarder comme modèle de saison">💾 Modèle saison</button>`:''}
    ${hasTpl&&g?`<button class="btn bsec bsm" onclick="applyTemplateToGame()" title="Appliquer le modèle">↺ Modèle</button>`:''}
  </div>
  <div class="sum-wrap"><table class="sum-table">
    <thead><tr>
      <th style="width:26px">#</th>
      <th class="th-name">Joueuse</th>
      <th>M1</th><th>M2</th><th>M3</th><th>M4</th><th>M5</th><th>M6</th>
    </tr></thead><tbody>`;

  allRows.forEach(({playerId,order,player,present})=>{
    if(!player)return;
    const rowCls=present?'':'sum-absent';
    h+=`<tr class="${rowCls}">
      <td><input class="ord-inp" type="number" min="1" max="99" value="${order||''}" placeholder="—"
        onchange="updateResumeOrder('${playerId}',this.value)"
        style="${present?'':'color:var(--mut)'}" /></td>
      <td class="sum-name" title="${player.name}">#${player.number} ${player.name}</td>`;
    for(let ing=1;ing<=6;ing++){
      const di=g?(g.defense[ing]||{}):{};
      const posId=Object.entries(di).find(([k,v])=>v===playerId)?.[0];
      const posNum=posId?_i2p[posId]:'';
      // Check template
      const tplPos=(!g&&hasTpl)?((S.team.template.lineup.find(l=>l.playerId===playerId)||{}).positions||{})[ing]:'';
      const val=g?(posNum||''):(tplPos||'');
      const cls=!val?'':val==='X'||val==='x'?' bench':' filled';
      h+=`<td><input class="pos-inp${cls}" type="text" maxlength="2" value="${val}" placeholder=""
        oninput="stylePosinp(this)"
        onchange="updateResumeCell('${playerId}',${ing},this.value)"
        onclick="this.select()" /></td>`;
    }
    h+='</tr>';
  });

  h+=`</tbody></table></div>
  <div class="pos-legend">
    <b>Positions :</b> 1=Lanceuse · 2=Receveuse · 3=1ère base · 4=2e base · 5=3e base · 6=Arrêt-court · 7=Ch.gauche · 8=Ch.centre · 9=Ch.droit · <b>X=Banc</b>
  </div>`;

  if(!g){
    h+=`<div class="card" style="margin-top:10px;padding:12px;text-align:center;color:var(--mut);font-size:.8rem">
      ⚾ Modifie ce tableau pour créer ton <b>modèle de saison</b>.<br>Chaque nouveau match l'utilisera automatiquement.<br>
      <button class="btn bacc" style="margin-top:10px" onclick="newGameModal()">+ Créer un match</button>
    </div>`;
  }

  el.innerHTML=h;
}

function stylePosinp(inp){
  const v=inp.value.trim().toUpperCase();
  inp.className='pos-inp'+(v===''?'':v==='X'?' bench':' filled');
}

function updateResumeCell(playerId,ing,rawVal){
  const val=rawVal.trim().toUpperCase();
  const g=CG();
  if(!g){
    // Modifier le modèle de saison
    if(!S.team.template||!S.team.template.lineup)S.team.template={lineup:[]};
    let lrow=S.team.template.lineup.find(l=>l.playerId===playerId);
    if(!lrow){lrow={playerId,order:null,positions:{}};S.team.template.lineup.push(lrow);}
    if(!lrow.positions)lrow.positions={};
    if(val===''||val==='—')delete lrow.positions[ing];
    else lrow.positions[ing]=val==='X'?'X':parseInt(val)||'';
    save();return;
  }
  // Modifier le match courant
  if(!g.defense[ing])g.defense[ing]={};
  // Retirer ce joueur de toute position dans cette manche
  Object.keys(g.defense[ing]).forEach(pid=>{if(g.defense[ing][pid]===playerId)delete g.defense[ing][pid];});
  if(val&&val!=='X'){
    const posId=_p2i[parseInt(val)];
    if(posId){
      // Retirer qui était déjà à cette position
      if(g.defense[ing][posId]&&g.defense[ing][posId]!==playerId){}
      g.defense[ing][posId]=playerId;
    }
  }
  save();
  // Rafraîchir défense si visible
  if(document.getElementById('screen-defense').classList.contains('active'))rDef();
}

function updateResumeOrder(playerId,val){
  const g=CG();
  const newOrd=parseInt(val);
  if(!g){
    // Modifier modèle
    if(!S.team.template||!S.team.template.lineup)S.team.template={lineup:[]};
    let lrow=S.team.template.lineup.find(l=>l.playerId===playerId);
    if(!lrow){lrow={playerId,order:newOrd||null,positions:{}};S.team.template.lineup.push(lrow);}
    else lrow.order=newOrd||null;
    save();rResume();return;
  }
  if(!newOrd){
    // Retirer du batting order
    g.batting=g.batting.filter(b=>b.playerId!==playerId);
  }else{
    const existing=g.batting.find(b=>b.playerId===playerId);
    if(existing){existing.order=newOrd;}
    else{g.batting.push({playerId,order:newOrd,pas:[]});}
  }
  // Re-normaliser les ordres
  g.batting.sort((a,b)=>a.order-b.order).forEach((b,i)=>b.order=i+1);
  save();rResume();
  if(document.getElementById('screen-frappe').classList.contains('active'))rFrappe();
}

function saveAsTemplate(){
  const g=CG();
  if(!g){showToast('⚠️ Aucun match actif');return;}
  S.team.template={lineup:g.batting.map(b=>{
    const positions={};
    for(let ing=1;ing<=6;ing++){
      const di=g.defense[ing]||{};
      const posId=Object.entries(di).find(([k,v])=>v===b.playerId)?.[0];
      if(posId){const n=_i2p[posId];if(n)positions[ing]=n;}
      else if(Object.values(di).length>0)positions[ing]='X';// a été remplacée ce match
    }
    return{playerId:b.playerId,order:b.order,positions};
  })};
  save();showToast('✅ Modèle de saison sauvegardé!');
}

function applyTemplateToGame(){
  const g=CG();const tpl=S.team.template;
  if(!g||!tpl||!tpl.lineup){showToast('⚠️ Aucun modèle');return;}
  if(!confirm('Appliquer le modèle de saison à ce match? Le batting order et la défense seront remplacés.'))return;
  g.batting=tpl.lineup.filter(l=>PB(l.playerId)).map(l=>({playerId:l.playerId,order:l.order,pas:[]}));
  for(let ing=1;ing<=6;ing++){
    g.defense[ing]={};
    tpl.lineup.forEach(l=>{
      const pos=l.positions?l.positions[ing]:null;
      if(pos&&pos!=='X'){const posId=_p2i[parseInt(pos)];if(posId)g.defense[ing][posId]=l.playerId;}
    });
  }
  save();rResume();showToast('✅ Modèle appliqué!');
}

// ── PAGE 1: ÉQUIPE ──
function addPlayer(){
  const name=document.getElementById('pn').value.trim();
  const num=document.getElementById('pno').value.trim();
  if(!name){showToast('⚠️ Entrez un nom');return;}
  S.team.players.push({id:uid(),name,number:num||'?'});
  save();document.getElementById('pn').value='';document.getElementById('pno').value='';
  document.getElementById('pn').focus();rRoster();showToast('✅ '+name+' ajoutée');
}

function delPlayer(id){
  if(!confirm('Supprimer cette joueuse?'))return;
  S.team.players=S.team.players.filter(p=>p.id!==id);
  S.games.forEach(g=>{g.batting=g.batting.filter(b=>b.playerId!==id);for(const i in g.defense)for(const p in g.defense[i])if(g.defense[i][p]===id)delete g.defense[i][p];});
  save();rRoster();
}

function calcPStats(pid){
  const POS_ORDER=['P','C','1B','2B','3B','SS','LF','CF','RF'];
  const totalGames=S.games.length;
  let present=0,bench=0;
  const posCnt={};
  POS_ORDER.forEach(p=>posCnt[p]=0);
  S.games.forEach(g=>{
    const inBat=g.batting.some(b=>b.playerId===pid);
    if(inBat)present++;
    let playedAny=false;
    for(let ing=1;ing<=6;ing++){
      const di=g.defense[ing]||{};
      const posId=Object.entries(di).find(([k,v])=>v===pid)?.[0];
      if(posId){posCnt[posId]=(posCnt[posId]||0)+1;playedAny=true;}
      else if(inBat&&Object.keys(di).length>0){bench++;}
    }
  });
  return{totalGames,present,bench,posCnt,POS_ORDER};
}

function rRoster(){
  const el=document.getElementById('roster');
  const pl=S.team.players;
  if(!pl.length){el.innerHTML='<div class="empty"><div class="ei">👥</div>Aucune joueuse. Ajoute des joueuses ci-dessus.</div>';return;}
  const hasGames=S.games.length>0;
  el.innerHTML=`<div class="ct">${pl.length} joueuse${pl.length>1?'s':''} dans l'équipe</div>`+
    pl.map(p=>{
      let statsHtml='';
      if(hasGames){
        const st=calcPStats(p.id);
        const pct=st.totalGames?Math.round(st.present/st.totalGames*100):0;
        const presClass=pct>=80?'hi':pct>=50?'mid':'low';
        const chips=st.POS_ORDER.filter(pos=>st.posCnt[pos]>0).map(pos=>{
          const cls=pos==='P'?'pos-P':pos==='C'?'pos-C':pos==='X'?'pos-X':'pos-field';
          return`<span class="ppos-chip ${cls}">${pos} ×${st.posCnt[pos]}</span>`;
        }).join('');
        const benchChip=st.bench>0?`<span class="ppos-chip pos-X">Banc ×${st.bench}</span>`:'';
        statsHtml=`<div class="pstats">
          <span class="pstats-pres ${presClass}">⚾ ${st.present}/${st.totalGames} matchs</span>
        </div>
        ${chips||benchChip?`<div class="ppos-chips">${chips}${benchChip}</div>`:'<div class="pstats" style="font-style:italic">Aucune manche enregistrée</div>'}`;
      }
      return`<div class="player-row" style="align-items:flex-start;padding:8px 4px">
        <div class="nbadge" style="margin-top:2px">${p.number}</div>
        <div class="pinfo" style="flex:1">
          <div class="pname">${p.name}</div>
          ${statsHtml}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:2px">
          <button class="ibtn" onclick="editPlayer('${p.id}')" title="Modifier le nom / numéro" style="font-size:.75rem">✏️</button>
          <button class="ibtn dng" onclick="delPlayer('${p.id}')" title="Supprimer">✕</button>
        </div>
      </div>`;
    }).join('');
}

// ── PAGE 2: FRAPPE ──
function initBatting(g){
  if(!g||g.batting.length||!S.team.players.length)return;
  g.batting=S.team.players.map(p=>({playerId:p.id,order:g.batting.length+1,pas:[]}));
  save();
}

function rFrappe(){
  const g=CG();const el=document.getElementById('frappe-c');
  if(!g){el.innerHTML='<div class="card"><div class="empty"><div class="ei">🏏</div>Aucun match sélectionné.<br>Crée un match avec <strong>+ Match</strong>.</div></div>';return;}
  if(!S.team.players.length){el.innerHTML='<div class="card"><div class="empty"><div class="ei">👥</div>Aucune joueuse dans l\'équipe.<br>Va dans l\'onglet <strong>Équipe</strong> pour en ajouter.</div></div>';return;}
  initBatting(g);
  const inBat=new Set(g.batting.map(b=>b.playerId));
  const notIn=S.team.players.filter(p=>!inBat.has(p.id));
  const past=S.games.filter(g2=>g2.id!==g.id&&g2.batting.length);
  let h=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="ct" style="margin-bottom:0">Ordre de frappe — ${g.date}${g.opponent?' vs '+g.opponent:''}</div>
      ${past.length?`<button class="btn bsec bsm" onclick="openCopyBatM()" style="font-size:.65rem">📋 Copier</button>`:''}
    </div>
    ${g.batting.map((b,i)=>{
      const p=PB(b.playerId);if(!p)return'';
      return`<div class="player-row">
        <div class="onum">${i+1}</div>
        <div class="nbadge" style="font-size:.72rem">${p.number}</div>
        <div class="pinfo">
          <div class="pname">${p.name}</div>
          <div class="pas">
            ${(b.pas||[]).map((pa,pi)=>`<span class="pac c${pa.result}" onclick="rmPa('${b.playerId}',${pi})" title="M${pa.inning}">${PAL[pa.result]||pa.result}</span>`).join('')}
            <button class="apab" onclick="openPaM('${b.playerId}')">+</button>
          </div>
        </div>
        <div class="ract">
          <button class="ibtn" onclick="mvBat('${b.playerId}',-1)"${i===0?' disabled':''}>▲</button>
          <button class="ibtn" onclick="mvBat('${b.playerId}',+1)"${i===g.batting.length-1?' disabled':''}>▼</button>
          <button class="ibtn dng" onclick="rmBat('${b.playerId}')" title="Retirer du line-up">✕</button>
        </div>
      </div>`;}).join('')}
    ${notIn.length?`<div class="divl"></div>
      <div class="ct" style="margin-bottom:8px">Remplaçantes disponibles</div>
      ${notIn.map(p=>`<div class="player-row">
        <div class="nbadge sub">${p.number}</div>
        <div class="pinfo"><div class="pname" style="color:var(--mut)">${p.name}</div></div>
        <button class="ibtn" onclick="addBat('${p.id}')" title="Ajouter au line-up">+</button>
      </div>`).join('')}`:''}
  </div>`;
  el.innerHTML=h;
}

function _normBat(g){g.batting.forEach((b,i)=>b.order=i+1);}
function addBat(pid){const g=CG();if(!g)return;if(g.batting.find(b=>b.playerId===pid))return;g.batting.push({playerId:pid,order:g.batting.length+1,pas:[]});_normBat(g);save();rFrappe();_syncResume();}
function rmBat(pid){const g=CG();if(!g)return;g.batting=g.batting.filter(b=>b.playerId!==pid);_normBat(g);save();rFrappe();_syncResume();}
function mvBat(pid,d){const g=CG();if(!g)return;const a=g.batting,i=a.findIndex(b=>b.playerId===pid),ni=i+d;if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];_normBat(g);save();rFrappe();_syncResume();}
function _syncResume(){if(document.getElementById('screen-resume').classList.contains('active'))rResume();}
function copyBat(gid){const g=CG();const s=S.games.find(x=>x.id===gid);if(!g||!s)return;g.batting=s.batting.map(b=>({playerId:b.playerId,order:b.order,pas:[]}));save();rFrappe();showToast('✅ Line-up copié');}
function openCopyBatM(){
  const past=S.games.filter(g2=>g2.id!==S.curGameId&&g2.batting.length);
  openM('Réutiliser un line-up','Match précédent',past.slice().reverse().map(pg=>`<div class="mrow" onclick="copyBat('${pg.id}');closeM()">
    <div class="pinfo"><div style="font-weight:600">${pg.date}${pg.opponent?' vs '+pg.opponent:''}</div><div style="font-size:.7rem;color:var(--mut)">${pg.batting.length} frappeuses</div></div>
    <span style="color:var(--acc)">Copier →</span>
  </div>`).join(''));
}

function openPaM(pid){
  const p=PB(pid);
  openM(`Présence au bâton — ${p.name}`,'Manche + résultat',`<div class="mpad">
    <div class="form-row"><label>Manche</label>
      <select id="pa-ing">${[1,2,3,4,5,6,7,8,9].map(n=>`<option value="${n}"${n===S.ui.ing?' selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="form-row" style="margin-bottom:6px"><label>Résultat</label></div>
    <div class="g3" style="gap:8px">
      ${[['1B','🟢 1B'],['2B','🔵 2B'],['3B','🟣 3B'],['HR','⭐ HR'],['BB','🔵 BB'],['OUT','🔴 RET'],['K','❌ K']].map(([r,l])=>`<button class="btn bsec" style="padding:10px 4px;font-size:.8rem" onclick="recPa('${pid}','${r}')">${l}</button>`).join('')}
    </div>
  </div>`);
}

function recPa(pid,res){
  const g=CG();if(!g)return;
  const b=g.batting.find(x=>x.playerId===pid);if(!b)return;
  const ing=parseInt(document.getElementById('pa-ing')?.value)||S.ui.ing;
  b.pas.push({inning:ing,result:res});
  save();closeM();rFrappe();showToast('✅ '+res+' enregistré');
}

function rmPa(pid,idx){
  const g=CG();if(!g)return;
  const b=g.batting.find(x=>x.playerId===pid);if(!b)return;
  if(!confirm('Retirer cette présence?'))return;
  b.pas.splice(idx,1);save();rFrappe();
}

// ── PAGE 3: DÉFENSE ──
function rDef(){
  const g=CG();const el=document.getElementById('def-c');
  if(!g){el.innerHTML='<div class="card"><div class="empty"><div class="ei">🏟️</div>Aucun match sélectionné.<br>Crée un match avec <strong>+ Match</strong>.</div></div>';return;}
  const ing=S.ui.dIng;
  const di=g.defense[ing]||{};
  const past=S.games.filter(g2=>g2.id!==g.id);
  let h=`<div class="itabs">
    ${[1,2,3,4,5,6].map(n=>`<button class="itab${n===ing?' active':''}" onclick="setDIng(${n})">Manche ${n}</button>`).join('')}
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    ${ing>1?`<button class="btn bsec bsm" onclick="cpPrevIng()">⬆ Copier M${ing-1}</button>`:''}
    ${past.length?`<button class="btn bsec bsm" onclick="openCpDefM()">📋 Matchs précédents</button>`:''}
    <button class="btn bdng bsm" onclick="clrIng()">🗑 Vider M${ing}</button>
  </div>
  <div class="field-wrap">${mkField(di)}</div>
  <div class="card" style="padding:10px 12px">
    <div class="ct">Positions — Manche ${ing}</div>
    ${FP.map(pos=>{
      const pid=di[pos.id];const p=pid?PB(pid):null;
      return`<div class="player-row">
        <div class="nbadge${p?'':' sub'}" style="min-width:36px;border-radius:8px;font-size:.7rem">${pos.id}</div>
        <div class="pinfo"><div class="pname">${p?`#${p.number} ${p.name}`:'—'}</div><div class="ppos">${pos.name}</div></div>
        <button class="btn bsec bsm" onclick="openDefM('${pos.id}',${ing})">${p?'Changer':'Assigner'}</button>
      </div>`;}).join('')}
  </div>
  ${(()=>{
    const asgnd=new Set(Object.values(di).filter(Boolean));
    const bench=S.team.players.filter(p=>!asgnd.has(p.id));
    return`<div class="card" style="padding:10px 12px;margin-top:8px">
      <div class="ct">🪑 Le Banc — Manche ${ing}</div>
      ${bench.length?bench.map(p=>`<div class="player-row">
        <div class="nbadge sub" style="min-width:36px;border-radius:8px;font-size:1rem">🪑</div>
        <div class="pinfo"><div class="pname">#${p.number} ${p.name}</div><div class="ppos">Sans position</div></div>
      </div>`).join(''):'<div class="empty" style="padding:12px 0;font-size:.85rem">Toutes les joueuses ont une position ✅</div>'}
    </div>`;
  })()}`;
  el.innerHTML=h;
}

function setDIng(n){S.ui.dIng=n;rDef();}

function cpPrevIng(){
  const g=CG();if(!g)return;
  const ing=S.ui.dIng;if(ing<=1)return;
  g.defense[ing]=JSON.parse(JSON.stringify(g.defense[ing-1]||{}));
  save();rDef();_syncResume();showToast(`✅ Manche ${ing-1} → Manche ${ing}`);
}

function clrIng(){
  const g=CG();if(!g)return;
  if(!confirm(`Vider la manche ${S.ui.dIng}?`))return;
  g.defense[S.ui.dIng]={};save();rDef();_syncResume();
}

function openCpDefM(){
  const past=S.games.filter(g2=>g2.id!==S.curGameId);
  openM('Copier une défense','Match précédent → 6 manches',past.slice().reverse().map(pg=>`
    <div class="mrow" onclick="cpDefFrom('${pg.id}');closeM()">
      <div class="pinfo"><div style="font-weight:600">${pg.date}${pg.opponent?' vs '+pg.opponent:''}</div><div style="font-size:.7rem;color:var(--mut)">6 manches complètes</div></div>
      <span style="color:var(--acc);font-size:.8rem">Copier →</span>
    </div>`).join('')||'<div class="empty">Aucun match précédent.</div>');
}

function cpDefFrom(gid){
  const g=CG();const s=S.games.find(x=>x.id===gid);if(!g||!s)return;
  g.defense=JSON.parse(JSON.stringify(s.defense));
  save();rDef();showToast('✅ Défense copiée (6 manches)');
}

function openDefM(posId,ingN){
  const g=CG();if(!g)return;
  const ing=parseInt(ingN);const di=g.defense[ing]||{};
  const curPid=di[posId];
  const pos=FP.find(p=>p.id===posId);
  const asgn={};for(const p in di)if(di[p])asgn[di[p]]=p;
  openM(`${posId} — ${pos.name}`,`Manche ${ing} — choisir une joueuse`,
    `<div class="mrow" onclick="asgPos('${posId}',${ing},null);closeM()">
      <div class="nbadge sub" style="font-size:1rem">✕</div>
      <div><div style="font-weight:600">Aucune joueuse</div><div style="font-size:.7rem;color:var(--mut)">Laisser vide</div></div>

// ── PLAY BALL TIMER ──
const _T_WARN=90*60*1000; // 1h30
const _T_LIM=105*60*1000; // 1h45
let _timerIv=null;

function playBall(){
  const g=CG();if(!g){showToast('⚠️ Aucun match actif');return;}
  if(g.startTime&&!confirm('Chrono déjà démarré — Réinitialiser?'))return;
  g.startTime=Date.now();g._alerted130=false;g._alerted145=false;
  save();_startTimer();rPartie();showToast('⚾ Play Ball! Chrono démarré');
}

function _startTimer(){
  if(_timerIv)clearInterval(_timerIv);
  _timerIv=setInterval(_tickTimer,1000);_tickTimer();
}

function _stopTimer(){if(_timerIv){clearInterval(_timerIv);_timerIv=null;}}

function _tickTimer(){
  const g=CG();if(!g||!g.startTime){_stopTimer();return;}
  const el=document.getElementById('pb-timer');if(!el)return;
  const elapsed=Date.now()-g.startTime;
  const h=Math.floor(elapsed/3600000);
  const m=Math.floor((elapsed%3600000)/60000);
  const s=Math.floor((elapsed%60000)/1000);
  el.textContent=(h?h+'h':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const stEl=document.getElementById('pb-status');
  const ruleEl=document.getElementById('pb-rule');
  if(elapsed>=_T_LIM){
    el.className='pb-timer danger';
    if(stEl)stEl.innerHTML='<span style="color:#ef4444;font-weight:700">🚨 1h45 atteint — Aucune nouvelle manche</span>';
    if(ruleEl)ruleEl.innerHTML='<span style="color:#ef4444">🚨 Le match doit se terminer dès que la manche en cours est complétée</span>';
    if(!g._alerted145){g._alerted145=true;save();
      openM('🚨 1h45 de jeu!','',`<div class="mpad" style="text-align:center">
        <div style="font-size:2.2rem">🚨</div>
        <div style="font-size:1rem;font-weight:800;color:#ef4444;margin:8px 0">TEMPS LIMITE ATTEINT</div>
        <div style="font-size:.85rem">Aucune nouvelle manche ne peut commencer.<br>
        Terminez la manche en cours et c'est la fin du match.</div>
        <button class="btn bdng" style="margin-top:14px;width:100%" onclick="closeM()">Compris</button>
      </div>`);
    }
  }else if(elapsed>=_T_WARN){
    el.className='pb-timer warn';
    if(stEl)stEl.innerHTML='<span style="color:#fbbf24;font-weight:700">⚠️ Manche ouverte — Max 10 pts d\'écart</span>';
    const rem=_T_LIM-elapsed;const rm=Math.floor(rem/60000);const rs=Math.floor((rem%60000)/1000);
    if(ruleEl)ruleEl.innerHTML=`<span style="color:#fbbf24">⚡ Dernière manche dans ${rm}:${String(rs).padStart(2,'0')}</span>`;
    if(!g._alerted130){g._alerted130=true;save();
      openM('⚾ Manche ouverte!','',`<div class="mpad" style="text-align:center">
        <div style="font-size:2.2rem">⚾</div>
        <div style="font-size:1rem;font-weight:800;color:#fbbf24;margin:8px 0">1h30 DE JEU ATTEINT</div>
        <div style="font-size:.85rem">La <strong>manche ouverte</strong> peut commencer.<br>
        Points illimités avec un maximum de<br>
        <span style="font-size:1.3rem;font-weight:800;color:#fbbf24">10 points d'écart</span></div>
        <button class="btn bacc" style="margin-top:14px;width:100%" onclick="closeM()">OK!</button>
      </div>`);
    }
  }else{
    el.className='pb-timer';
    const rem=_T_WARN-elapsed;const rm=Math.floor(rem/60000);const rs=Math.floor((rem%60000)/1000);
    if(stEl)stEl.innerHTML=`<span style="color:var(--mut)">Règle 4 pts/manche — Manche ouverte dans <strong>${rm}:${String(rs).padStart(2,'0')}</strong></span>`;
    if(ruleEl)ruleEl.innerHTML='<span style="color:#4ade80">✅ Max 4 points par manche par équipe</span>';
  }
}

// ── LANCEURS — LIMITE HEBDOMADAIRE ──
function _weekStart(dateStr){
  const d=new Date(dateStr||Date.now());
  const day=d.getDay();
  d.setDate(d.getDate()-((day+6)%7)); // lundi
  d.setHours(0,0,0,0);return d.getTime();
}
function _pitLimit(dateStr){
  const m=new Date(dateStr||Date.now()).getMonth()+1;
  return m>=7?7:5; // juil-oct=7, reste=5
}
function _pitWeekInnings(pid,refDate){
  const ws=_weekStart(refDate);
  const we=ws+7*86400000;
  let cnt=0;
  S.games.forEach(g=>{
    const gd=new Date(g.date).getTime();
    if(gd<ws||gd>=we)return;
    for(let i=1;i<=6;i++){if((g.defense[i]||{})['P']===pid)cnt++;}
  });
  return cnt;
}

function _rPitWeek(){
  const el=document.getElementById('pit-week');if(!el)return;
  const pid=S.ui.pitId;const g=CG();
  if(!pid||!g){el.innerHTML='';return;}
  const p=PB(pid);if(!p){el.innerHTML='';return;}
  const refDate=g.date||new Date().toISOString().split('T')[0];
  const innings=_pitWeekInnings(pid,refDate);
  const limit=_pitLimit(refDate);
  const pct=Math.min(100,Math.round(innings/limit*100));
  const cls=innings>=limit?'danger':innings>=limit-1?'warn':'ok';
  const fillCls=innings>=limit?'danger':innings>=limit-1?'warn':'';
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const mo=months[new Date(refDate).getMonth()];
  el.innerHTML=`<div class="pit-week-bar">
    <div class="pwb-row">
      <span class="pwb-label">Manches lancées cette semaine (${mo})</span>
      <span class="pwb-count ${cls}">${innings}/${limit}</span>
    </div>
    <div class="pwb-track"><div class="pwb-fill ${fillCls}" style="width:${pct}%"></div></div>
    ${innings>=limit?'<div style="font-size:.65rem;color:#ef4444;margin-top:2px">🚨 Limite atteinte cette semaine</div>':innings>=limit-1?'<div style="font-size:.65rem;color:#fbbf24;margin-top:2px">⚠️ Dernière manche disponible</div>':''}
  </div>`;
}

function setPitcher(id){S.ui.pitId=id||null;save();updPitch();_rPitWeek();}

function chgIng(d){const n=S.ui.ing+d;if(n<1||n>25)return;S.ui.ing=n;_ab.b=0;_ab.s=0;_ab.outs=0;save();document.getElementById('ing-disp').textContent=n;document.getElementById('ing-lbl').textContent=n;updPitch();_rAbDisplay();}

function getpd(pid,ing){const g=CG();if(!g||!g.pitches[pid])return null;return g.pitches[pid][ing]||null;}

function updPitch(){
  const g=CG();const pid=S.ui.pitId;const ing=S.ui.ing;
  const d=(g&&pid)?getpd(pid,ing):null;
  document.getElementById('cb-b').textContent=d?d.ball:0;
  document.getElementById('cb-s').textContent=d?d.strike:0;
  document.getElementById('cb-h').textContent=d?d.hit:0;
  const dots=document.getElementById('pdots');
  if(d&&d.history&&d.history.length){
    dots.innerHTML=d.history.map(t=>`<div style="width:9px;height:9px;border-radius:${{hbp:'2px'}[t]||'50%'};background:${{ball:'#f59e0b',strike:'#22c55e',hit:'#ef4444',hbp:'#a855f7'}[t]||'#666'}"></div>`).join('');
  }else dots.innerHTML='';
}

function updTot(){
  const g=CG();if(!g){document.getElementById('tot-p').textContent=0;return;}
  let t=0;for(const p in g.pitches)for(const i in g.pitches[p]){const d=g.pitches[p][i];t+=(d.ball||0)+(d.strike||0)+(d.hit||0)+(d.hbp||0);}
  document.getElementById('tot-p').textContent=t;
}

// ── COMPTEUR AU BÂTON (ADVERSAIRES) ──
let _ab={b:0,s:0,outs:0};

function _rAbDisplay(){

  const bDots=Array(4).fill(0).map((_,i)=>`<div class="ab-dot${i<_ab.b?' ball':''}"></div>`).join('');
  const sDots=Array(3).fill(0).map((_,i)=>`<div class="ab-dot${i<_ab.s?' strike':''}"></div>`).join('');
  const oDots=Array(3).fill(0).map((_,i)=>`<div class="ab-dot${i<_ab.outs?' out':''}"></div>`).join('');

    <div class="ab-header">
      <span class="ab-label">ADVERSAIRES — AU BÂTON</span>

function _abNext(){_ab.b=0;_ab.s=0;_rAbDisplay();}
function _abReset(){_ab.b=0;_ab.s=0;_rAbDisplay();}

function _abOut(){
  _ab.b=0;_ab.s=0;
  _ab.outs++;
  if(_ab.outs>=3){
    _ab.outs=0;
    _rAbDisplay();
    openM('🏟️ Fin de manche!','',`<div class="mpad" style="text-align:center">

      <div style="font-size:1.1rem;font-weight:800;color:var(--acc)">FIN DE MANCHE!</div>
      <div style="font-size:.82rem;color:var(--mut);margin:8px 0">3 retirés — La manche est terminée.</div>
      <button class="btn bacc" style="width:100%;margin-top:8px" onclick="closeM()">OK</button>
    </div>`);

    _rAbDisplay();
  }
}

function _showHitOutcome(){
  openM('💥 Frappée adverse — Résultat?','',`<div class="mpad">
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn bacc" onclick="closeM();_hitOutcome('safe')">✅ Sur les buts (coup sûr)</button>
      <button class="btn bdng" onclick="closeM();_hitOutcome('out')">❌ Retirée en jeu</button>

}

function _hitOutcome(result){

    showToast('❌ Retirée en jeu');

  }else{
    showToast('✅ Sur les buts');

// ── POINTAGE ──
function _initScore(g){if(!g.score)g.score={home:[0,0,0,0,0,0],visit:[0,0,0,0,0,0]};}

function rScore(){
  const el=document.getElementById('score-area');if(!el)return;
  const g=CG();if(!g){el.innerHTML='';return;}
  _initScore(g);
  const sc=g.score;
  const hTot=sc.home.reduce((a,b)=>a+b,0);
  const vTot=sc.visit.reduce((a,b)=>a+b,0);
  const opp=g.opponent||'Adversaire';
  el.innerHTML=`<div class="card" style="padding:10px 8px">
    <div class="ct" style="margin-bottom:8px">⚾ Pointage</div>
    <div style="overflow-x:auto">
      <table class="sc-tbl">
        <thead><tr>
          <th style="text-align:left;min-width:70px"></th>
          <th>M1</th><th>M2</th><th>M3</th><th>M4</th><th>M5</th><th>M6</th>
          <th style="background:var(--acc);color:#000">R</th>
        </tr></thead>
        <tbody>
          <tr>
            <td class="sc-team">Nous</td>
            ${sc.home.map((r,i)=>`<td class="sc-cell">
              <div class="sc-runs">${r}</div>
              <div class="sc-adj">
                <button onclick="adjScore('home',${i},1)">+</button>
                <button onclick="adjScore('home',${i},-1)">−</button>
              </div>
            </td>`).join('')}
            <td class="sc-total${hTot>vTot?' sc-win':''}">${hTot}</td>
          </tr>
          <tr>
            <td class="sc-team" title="${opp}">${opp.length>10?opp.slice(0,10)+'…':opp}</td>
            ${sc.visit.map((r,i)=>`<td class="sc-cell">
              <div class="sc-runs">${r}</div>
              <div class="sc-adj">
                <button onclick="adjScore('visit',${i},1)">+</button>
                <button onclick="adjScore('visit',${i},-1)">−</button>
              </div>
            </td>`).join('')}
            <td class="sc-total${vTot>hTot?' sc-win':''}">${vTot}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function adjScore(team,ing,delta){
  const g=CG();if(!g)return;
  _initScore(g);
  const newVal=Math.max(0,g.score[team][ing]+delta);
  // Avertissement max 4 pts/manche avant manche ouverte
  if(delta>0&&newVal>4&&g.startTime){
    const elapsed=Date.now()-g.startTime;
    if(elapsed<_T_WARN)showToast('⚠️ Max 4 points par manche avant 1h30');
  }
  g.score[team][ing]=newVal;
  save();rScore();
}

function doPitch(type){
  const g=CG();if(!g){showToast('⚠️ Aucun match — crée un match d\'abord');return;}
  if(!S.ui.pitId){showToast('⚠️ Choisissez une lanceuse');return;}
  const pid=S.ui.pitId,ing=S.ui.ing;
  if(!g.pitches[pid])g.pitches[pid]={};
  if(!g.pitches[pid][ing])g.pitches[pid][ing]={ball:0,strike:0,hit:0,history:[]};
  g.pitches[pid][ing][type]++;g.pitches[pid][ing].history.push(type);
  save();updPitch();updTot();

  if(type==='ball'){
    _ab.b++;
    _rAbDisplay();
    if(_ab.b>=4){
      _abReset();
      openM('⚾ But sur balle!','',`<div class="mpad" style="text-align:center">
        <div style="font-size:2.5rem;margin-bottom:8px">🚶</div>
        <div style="font-size:1.1rem;font-weight:800;color:var(--acc)">BUT SUR BALLE (BB)</div>
        <div style="font-size:.82rem;color:var(--mut);margin:8px 0">4 balles — L'adversaire marche au premier but.</div>
        <button class="btn bacc" style="width:100%;margin-top:8px" onclick="closeM()">OK</button>
      </div>`);
    }else{
      showToast('⚪ BALL — '+_ab.b+'/4');
    }
  }else if(type==='strike'){
    _ab.s++;
    _rAbDisplay();
    if(_ab.s>=3){
      openM('⭕ Retrait au bâton!','',`<div class="mpad" style="text-align:center">
        <div style="font-size:2.5rem;margin-bottom:8px">⭕</div>
        <div style="font-size:1.1rem;font-weight:800;color:#ef4444">RETRAIT (K)</div>
        <div style="font-size:.82rem;color:var(--mut);margin:8px 0">3 prises — L'adversaire est retirée au bâton.</div>
        <button class="btn bdng" style="width:100%;margin-top:8px" onclick="closeM();_abOut()">OK</button>
      </div>`);
    }else{
      showToast('✅ PRISE — '+_ab.s+'/3');
    }
  }else if(type==='hit'){
    _showHitOutcome();
  }
}

function undoPitch(){
  const g=CG();if(!g)return;
  const pid=S.ui.pitId,ing=S.ui.ing;
  const d=pid?getpd(pid,ing):null;
  if(!d||!d.history||!d.history.length){showToast('Rien à annuler');return;}
  const l=d.history.pop();d[l]=Math.max(0,(d[l]||0)-1);
  // Annuler aussi le compteur au bâton adversaire
  if(l==='ball'&&_ab.b>0)_ab.b--;
  else if(l==='strike'&&_ab.s>0)_ab.s--;
  save();updPitch();updTot();_rAbDisplay();
  showToast('↩ Annulé — '+({ball:'BALL',strike:'PRISE',hit:'FRAPPÉE',hbp:'ATTEINTE'}[l]||l));
}

// ── HBP & RETRAIT ──
function doHBP(){
  const g=CG();if(!g){showToast('⚠️ Aucun match actif');return;}
  if(!S.ui.pitId){showToast('⚠️ Choisissez une lanceuse');return;}
  const pid=S.ui.pitId,ing=S.ui.ing;
  if(!g.pitches[pid])g.pitches[pid]={};
  if(!g.pitches[pid][ing])g.pitches[pid][ing]={ball:0,strike:0,hit:0,hbp:0,history:[]};
  const d=g.pitches[pid][ing];
  if(!d.hbp)d.hbp=0;
  d.hbp++;d.history.push('hbp');
  _abReset();

function rBatSt(){
  const ps={};
  S.games.forEach(g=>g.batting.forEach(b=>{
    if(!ps[b.playerId])ps[b.playerId]={ab:0,h:0,d:0,t:0,hr:0,bb:0,k:0};
    const s=ps[b.playerId];
    (b.pas||[]).forEach(pa=>{
      if(['1B','2B','3B','HR'].includes(pa.result)){s.ab++;s.h++;}
      if(pa.result==='2B')s.d++;
      if(pa.result==='3B')s.t++;
      if(pa.result==='HR')s.hr++;
      if(pa.result==='BB')s.bb++;
      if(['OUT','K'].includes(pa.result))s.ab++;
      if(pa.result==='K')s.k++;
    });
  }));
  const rows=S.team.players.filter(p=>ps[p.id]).map(p=>{
    const s=ps[p.id];const avg=s.ab>0?(s.h/s.ab).toFixed(3).replace(/^0/,''):'.000';
    return`<tr><td>${p.name}</td><td>${s.ab}</td><td class="hl">${s.h}</td><td>${s.d}</td><td>${s.t}</td><td>${s.hr}</td><td>${s.bb}</td><td>${s.k}</td><td class="hl">${avg}</td></tr>`;
  }).join('');
  if(!rows)return'<div class="card"><div class="empty"><div class="ei">📊</div>Aucune stat. Enregistre des présences au bâton dans <strong>Frappe</strong>.</div></div>';
  return`<div class="card" style="overflow-x:auto"><div class="ct">Statistiques au bâton — Tous les matchs</div>
  <table class="stbl"><thead><tr><th>Joueuse</th><th>AB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>BB</th><th>K</th><th>MOY</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rPitSt(){
  const pd={};
  S.games.forEach(g=>{for(const pid in g.pitches){if(!pd[pid])pd[pid]={};for(const ing in g.pitches[pid]){if(!pd[pid][ing])pd[pid][ing]={ball:0,strike:0,hit:0};const d=g.pitches[pid][ing];pd[pid][ing].ball+=d.ball||0;pd[pid][ing].strike+=d.strike||0;pd[pid][ing].hit+=d.hit||0;}}});
  if(!Object.keys(pd).length)return'<div class="card"><div class="empty"><div class="ei">⚾</div>Aucun lancer enregistré. Utilise l\'onglet <strong>Partie</strong>.</div></div>';
  return S.team.players.filter(p=>pd[p.id]).map(p=>{
    const d=pd[p.id];const mxI=Math.max(...Object.keys(d).map(Number));
    let tB=0,tS=0,tH=0,rows='';
    for(let i=1;i<=mxI;i++){const x=d[i];if(!x||x.ball+x.strike+x.hit===0)continue;tB+=x.ball;tS+=x.strike;tH+=x.hit;rows+=`<tr><td>M${i}</td><td style="color:#f59e0b;font-weight:700">${x.ball}</td><td style="color:#22c55e;font-weight:700">${x.strike}</td><td style="color:#ef4444;font-weight:700">${x.hit}</td><td>${x.ball+x.strike+x.hit}</td></tr>`;}
    return`<div class="card"><div class="ct">⚾ #${p.number} ${p.name}</div>
    <table class="stbl"><thead><tr><th>Manche</th><th style="color:#f59e0b">Balles</th><th style="color:#22c55e">Prises</th><th style="color:#ef4444">Frappées</th><th>Total</th></tr></thead>
    <tbody>${rows}<tr style="background:var(--sur2);font-weight:800"><td>TOTAL</td><td style="color:#f59e0b">${tB}</td><td style="color:#22c55e">${tS}</td><td style="color:#ef4444">${tH}</td><td>${tB+tS+tH}</td></tr></tbody></table></div>`;
  }).join('')||'<div class="card"><div class="empty">Aucune lanceuse avec données.</div></div>';
}

function printLineup(){
  const g=CG();
  const hdr=`<h1>⚾ ${S.team.name||'Baseball Coach'}</h1>
  <div class="sub">${g?`Match du ${g.date}${g.opponent?' vs '+g.opponent:''}`:'Aucun match actif'} &nbsp;|&nbsp; Imprimé le ${new Date().toLocaleDateString('fr-CA')}</div>`;
  if(!g){_prBase('Line-up',hdr+'<p>Aucun match actif.</p>');return;}

  // Ordre de frappe
  let bat=`<h2>📋 Ordre de frappe</h2>
  <table><thead><tr><th>#</th><th>Joueuse</th><th>M1</th><th>M2</th><th>M3</th><th>M4</th><th>M5</th><th>M6</th></tr></thead><tbody>`;
  const sorted=g.batting.slice().sort((a,b)=>a.order-b.order);
  sorted.forEach(b=>{
    const p=PB(b.playerId);if(!p)return;
    const pos=[1,2,3,4,5,6].map(n=>{const pid=(g.defense[n]||{})[Object.keys(g.defense[n]||{}).find(k=>(g.defense[n]||{})[k]===b.playerId)||''];const pp=PB(pid||'');return pp?pp.number:'';});
    // positions par manche pour ce joueur
    const pByI=[1,2,3,4,5,6].map(n=>{const di=g.defense[n]||{};const posId=Object.entries(di).find(([k,v])=>v===b.playerId)?.[0];return posId||'';});
    bat+=`<tr><td style="font-weight:800;text-align:center">${b.order}</td><td>#${p.number} ${p.name}</td>${pByI.map(v=>`<td style="text-align:center">${v}</td>`).join('')}</tr>`;
  });
  bat+='</tbody></table>';

  // Score
  _initScore(g);
  const sc=g.score;const hT=sc.home.reduce((a,b)=>a+b,0);const vT=sc.visit.reduce((a,b)=>a+b,0);
  let score=`<h2>🏆 Pointage</h2><table><thead><tr><th></th><th>M1</th><th>M2</th><th>M3</th><th>M4</th><th>M5</th><th>M6</th><th>R</th></tr></thead><tbody>`;

  score+=`<tr><td><b>${g.opponent||'Adversaire'}</b></td>${sc.visit.map(r=>`<td style="text-align:center">${r}</td>`).join('')}<td style="font-weight:800;text-align:center">${vT}</td></tr>`;
  score+='</tbody></table>';

  // Résumé positions
  let res=`<h2>📊 Résumé des positions</h2>
  <table><thead><tr><th>Pos.</th><th>M1</th><th>M2</th><th>M3</th><th>M4</th><th>M5</th><th>M6</th></tr></thead><tbody>`;
  FP.forEach(pos=>{
    const cells=[1,2,3,4,5,6].map(n=>{const pid=(g.defense[n]||{})[pos.id];const p=pid?PB(pid):null;return p?`#${p.number} ${p.name}`:'';});
    if(cells.some(c=>c))res+=`<tr><td><b>${pos.id}</b> ${pos.name}</td>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;
  });
  res+='</tbody></table>';

  _prBase('Line-up & Résumé',hdr+bat+score+res);
}

function printTerrain(){
  const g=CG();
  const hdr=`<h1>⚾ ${S.team.name||'Baseball Coach'} — Terrain par manche</h1>
  <div class="sub">${g?`Match du ${g.date}${g.opponent?' vs '+g.opponent:''}`:'Aucun match actif'} &nbsp;|&nbsp; Imprimé le ${new Date().toLocaleDateString('fr-CA')}</div>`;
  if(!g){_prBase('Terrain',hdr+'<p>Aucun match actif.</p>');return;}

  // Positions sur terrain (x,y en %) pour les 9 positions
  const POS_XY={P:[50,60],C:[50,82],1:[72,68],'1B':[72,68],2:[62,44],'2B':[62,44],3:[38,44],'3B':[38,44],SS:[38,44],4:[62,44],5:[38,68],'5':[38,68],6:[28,56],7:[15,22],8:[50,12],9:[85,22]};
  const _posXY={'P':[50,60],'C':[50,82],'1B':[72,70],'2B':[62,44],'3B':[38,70],'SS':[28,52],'LF':[15,22],'CF':[50,14],'RF':[85,22]};

  let fields='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  for(let ing=1;ing<=6;ing++){
    const di=g.defense[ing]||{};
    // SVG diamant
    let svg=`<svg viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg" width="220" height="195" style="display:block">
      <!-- terrain -->
      <rect width="260" height="230" fill="#f0f9e8"/>
      <!-- ligne de côté -->
      <polygon points="130,190 220,90 130,10 40,90" fill="#c8e6a0" stroke="#555" stroke-width="1.5"/>
      <!-- losange (infield) -->
      <polygon points="130,175 205,105 130,35 55,105" fill="#d4a96a" stroke="#555" stroke-width="1.5"/>
      <!-- monticule -->
      <circle cx="130" cy="110" r="12" fill="#c8a06a" stroke="#555" stroke-width="1"/>
      <!-- marbre -->
      <polygon points="130,180 122,188 130,195 138,188" fill="#fff" stroke="#333" stroke-width="1"/>
      <!-- buts -->
      <rect x="123" y="28" width="14" height="14" fill="#fff" stroke="#333" stroke-width="1"/>
      <rect x="198" y="98" width="14" height="14" fill="#fff" stroke="#333" stroke-width="1"/>
      <rect x="48" y="98" width="14" height="14" fill="#fff" stroke="#333" stroke-width="1"/>
      <text x="130" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Manche ${ing}</text>`;

    // Positionner chaque joueuse
    Object.entries(di).forEach(([posId,pid])=>{
      const p=PB(pid);if(!p)return;

    });

    svg+='</svg>';
    // Légende
    let leg='<table style="width:220px;font-size:8px;margin-top:2px"><tbody>';
    Object.entries(di).forEach(([posId,pid])=>{const p=PB(pid);if(p)leg+=`<tr><td style="width:28px;font-weight:700">${posId}</td><td>#${p.number} ${p.name}</td></tr>`;});
    leg+='</tbody></table>';
    fields+=`<div style="border:1px solid #ccc;padding:4px;border-radius:4px;margin-bottom:4px">${svg}${leg}</div>`;
  }
  fields+='</div>';

  _prBase('Terrain & Positions',hdr+fields);
}

function doImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.team||!d.games)throw 0;S=d;save();showToast('📥 Données importées!');go('equipe');}catch(err){showToast('⚠️ Fichier invalide');}};
  r.readAsText(f);e.target.value='';
}

      <div style="display:flex;gap:8px">

        <button class="btn bacc" style="flex:1" onclick="closeM();S.team=window._importData.team;S.games=window._importData.games;S.curGameId=window._importData.curGameId||null;if(!S.games.find(g=>g.id===S.curGameId))S.curGameId=S.games.length?S.games[S.games.length-1].id:null;save();rRoster();rtopbar();history.replaceState(null,'',location.pathname);showToast('✅ Données importées!')">📥 Importer</button>
      </div>
    </div>`);
  }catch(e){history.replaceState(null,'',location.pathname);}
}

// ── MODAL ──
function openM(t,s,body){
  document.getElementById('mt').textContent=t;
  document.getElementById('ms').textContent=s;
  document.getElementById('mb').innerHTML=body;
  document.getElementById('mbg').classList.add('show');
}
function closeM(){document.getElementById('mbg').classList.remove('show');}
function closeMifBg(e){if(e.target===document.getElementById('mbg'))closeM();}

// ── TOAST ──
let _tt;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),1800);}
